# Temporary OSV baseline created when dependency scanning was introduced.
#
# Keep these package/version-specific overrides narrow and time-bound. They let
# the scanner block new vulnerable packages or version changes while existing
# dependency cleanup is handled in focused follow-up work.

[[PackageOverrides]]
name = "pytest"
version = "8.4.2"
ecosystem = "PyPI"
vulnerability.ignore = true
effectiveUntil = 2026-07-31
reason = "Test-only baseline while validating pytest 9.x compatibility."

