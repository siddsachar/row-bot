    output: developer-workspace.png
    alt: Row-Bot Developer Studio workspace inspector.
    reason: Developer workspace capture needs a temp repository fixture and workspace selector coverage before opening real terminal/server controls.
    follow_up: Seed a generated temp repo and capture the real Developer workspace with external processes disabled.
