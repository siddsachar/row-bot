desktop_defaults: &desktop
  status: required
  scenario: configured
  viewport: desktop
  source: isolated-demo-data
  review_status: approved
  public_asset: true
  masks: ['[data-sensitive]']
mobile_defaults: &mobile
  status: required
  scenario: mobile
  viewport: mobile
  source: isolated-demo-data
  review_status: approved
  public_asset: true
  masks: ['[data-sensitive]']
screenshots:
  first-launch-setup-wizard:
    <<: *desktop
    title: First-launch setup wizard
    scenario: first-run
    source: isolated-first-launch
    route: /?docs_surface=first-launch-setup-wizard
    capture_selector: '[data-docs-id="setup-wizard"]'
    wait_for: '[data-docs-id="setup-wizard"]'
    expected_text: [Welcome to Row-Bot, Connect your first model]
    output: first-launch-setup-wizard.png
    alt: First-launch Row-Bot setup showing local, subscription, API, and custom model connection routes.
    docs_pages: [/docs/getting-started/first-launch]
  setup-center:
    <<: *desktop
    title: Setup Center
    route: /?dialog=setup-center
    capture_selector: '[data-docs-id="setup-center"]'
    wait_for: '[data-docs-id="setup-center"]'
    expected_text: [Setup Center, Models]
    output: setup-center.png
    alt: Resumable Row-Bot Setup Center with core and optional configuration cards.
    docs_pages: [/docs/getting-started/first-launch]
  app-shell-overview:
    <<: *desktop
    title: Expanded desktop application shell
    route: /?home_tab=Workflows
    capture_selector: '[data-docs-id="app-shell"]'
    wait_for: '[data-docs-id="home-panel-workflows"]'
    expected_text: [Conversations, Workflows, Activity]
    output: app-shell-overview.png
    alt: Fully expanded Row-Bot desktop application with conversation sidebar, Home workspace, and Activity drawer.
    docs_pages: [/docs/app-shell/navigation]
  chat-main:
    <<: *desktop
    title: Chat conversation
    route: /?docs_surface=chat-main&thread_id=docs-demo-chat
    capture_selector: '[data-docs-id="chat-surface"]'
    wait_for: '[data-docs-id="chat-surface"]'
    expected_text: [Demo launch checklist, Summarize the launch checklist]
    output: chat-main.png
    alt: Row-Bot chat with a fictional launch-checklist conversation, composer controls, goal, and agent activity.
    docs_pages: [/docs/chat/]
  chat-model-picker:
    <<: *desktop
    title: Chat model picker
    route: /?docs_surface=chat-main&thread_id=docs-demo-chat
    actions:
      - click_selector: '[data-docs-id="chat-model-picker"]'
      - wait_for_text: Custom local endpoint
    capture_selector: '[data-docs-id="chat-model-picker"]'
    wait_for: '[data-docs-id="chat-model-picker"]'
    expected_text: [Default, Ollama Local, Custom local endpoint]
    output: chat-model-picker.png
    alt: Open chat model picker showing provider-qualified local Quick Choices and the thread default.
    docs_pages: [/docs/chat/model-picker]
  chat-tool-trace:
    <<: *desktop
    title: Chat tool trace
    route: /?docs_surface=chat-tool-trace&thread_id=docs-demo-chat
    actions:
      - click_text: filesystem.search
    capture_selector: '[data-docs-id="tool-trace"]'
    wait_for: '[data-docs-id="tool-trace"]'
    expected_text: [filesystem.search]
    output: chat-tool-trace.png
    alt: Expanded Row-Bot tool trace containing inert results from the isolated demonstration workspace.
    docs_pages: [/docs/chat/tools-approvals-and-terminal]
  chat-approval:
    <<: *desktop
    title: Consequential action approval
    route: /?docs_surface=chat-main&thread_id=docs-demo-chat&dialog=approval
    capture_selector: '[data-docs-id="approval-dialog"]'
    wait_for: '[data-docs-id="approval-dialog"]'
    expected_text: [Confirmation Required, launch-summary.md, Reversible]
    output: chat-approval.png
    alt: Row-Bot confirmation dialog describing a reversible write to the isolated demo workspace with Approve and Deny controls.
    docs_pages: [/docs/privacy-safety/, /docs/chat/tools-approvals-and-terminal]
