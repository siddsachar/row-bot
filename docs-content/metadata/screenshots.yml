  chat-model-picker:
    title: Chat Model Picker
    surface: chat
    status: deferred
    scenario: chat
    route: /?docs_surface=chat-model-picker&thread_id=docs-demo-chat
    capture_selector: '[data-docs-id="model-picker"]'
    expected_text:
      - Model
    output: chat-model-picker.png
    alt: Row-Bot model picker showing provider-qualified model choices.
    reason: The composer model picker needs additional stable real DOM selectors before safe automation can open it without brittle text clicks.
    follow_up: Add selectors to the composer policy cluster and recapture from the real chat route.
  chat-tool-trace:
    title: Chat Tool Trace
    surface: chat
    status: deferred
    scenario: chat
    route: /?docs_surface=chat-main&thread_id=docs-demo-chat
    capture_selector: '[data-docs-id="tool-trace"]'
    expected_text:
      - filesystem.search
    output: chat-tool-trace.png
    alt: Row-Bot tool trace with grouped tool activity.
    reason: Seeded tool-result rendering is present in chat state but lacks a dedicated stable trace selector for focused capture.
    follow_up: Add selectors in row_bot.ui.tool_trace and capture the real rendered trace.
  chat-approval:
    title: Chat Approval Dialog
    surface: chat
    status: deferred
    scenario: chat
    route: /
    capture_selector: '[data-docs-id="approval-dialog"]'
    expected_text:
      - Approval
    output: chat-approval.png
    alt: Row-Bot approval dialog for a sensitive action.
    reason: Approval dialogs require a deterministic pending interrupt state that is safe to trigger without starting a real tool run.
    follow_up: Seed a pending interrupt fixture and attach selectors to the real approval dialog.
