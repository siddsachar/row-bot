    capture_selector: '[data-docs-id="plugin-marketplace"]'
    expected_text:
      - Marketplace
    output: plugin-marketplace.png
    alt: Row-Bot Plugin marketplace.
    reason: Marketplace opening can touch remote catalog paths unless a safe offline adapter is added.
    follow_up: Add a capture-only offline marketplace adapter that still renders the real marketplace dialog.
