screenshots:
  first-launch-setup-wizard:
    title: First Launch Setup Wizard
    surface: onboarding
    status: required
    scenario: first-run
    viewport: desktop
    route: /?docs_surface=first-launch-setup-wizard
    actions:
      - wait_for_selector: '[data-docs-id="setup-wizard"]'
