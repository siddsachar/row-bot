name: Bug report
description: Report something broken in Thoth
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include API keys or private data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Thoth version
      placeholder: v3.19.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS Apple Silicon
        - macOS Intel
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only the relevant part. Remove secrets first.
      render: text
