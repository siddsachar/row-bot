# =============================================================================
# notarize-submit.yml — Submit signed DMG to Apple for notarization
#
# Run this AFTER you've tested the signed DMG from the release build.
# It uploads the DMG to Apple and confirms the submission is "In Progress".
#
# Input:
#   build_run_id — GitHub Actions run ID that produced the Thoth-macOS artifact
#
# Output (in the job log):
#   Submission ID — use this in notarize-check.yml to poll status / staple
# =============================================================================

name: "Notarize: Submit DMG"

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'GitHub Actions run ID that produced the DMG artifact'
        required: true

jobs:
  submit:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Download signed DMG from build run
        uses: actions/download-artifact@v8
        with:
          name: Thoth-macOS
          path: dist
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Apple notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          DMG_PATH="$(ls dist/Thoth-*-macOS-*.dmg | head -n1)"
          echo "DMG: $DMG_PATH"
          echo "Size: $(du -h "$DMG_PATH" | cut -f1)"
          echo ""

          # ── Submit (no timeout — let the ~700 MB upload finish) ──────────
          NOTARY_JSON="$RUNNER_TEMP/notary_submit.json"
          attempts=0
          max_attempts=3
          submitted=false

          while [ "$attempts" -lt "$max_attempts" ]; do
            attempts=$((attempts + 1))
            echo "Submit attempt ${attempts}/${max_attempts}..."
            if xcrun notarytool submit "$DMG_PATH" \
                 --apple-id "$APPLE_ID" \
                 --password "$APPLE_APP_PASSWORD" \
                 --team-id "$APPLE_TEAM_ID" \
                 --output-format json > "$NOTARY_JSON" 2>&1; then
              submitted=true
              break
            fi
            echo "::warning::Submit attempt ${attempts} failed:"
            cat "$NOTARY_JSON" || true
            echo ""
            echo "Retrying in 30s..."
            sleep 30
          done

          if [ "$submitted" != true ]; then
            echo "::error::Notarization submit failed after ${max_attempts} attempts."
            exit 1
          fi

          SUBMISSION_ID="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("id",""))' "$NOTARY_JSON")"
          echo ""
          echo "Upload accepted by Apple.  Submission ID: $SUBMISSION_ID"
          echo ""

          # ── Brief poll to confirm Apple shows "In Progress" ──────────────
          echo "Confirming submission is In Progress..."
          for i in $(seq 1 6); do
            sleep 30
            info_json="$RUNNER_TEMP/notary_info.json"
            if xcrun notarytool info "$SUBMISSION_ID" \
                 --apple-id "$APPLE_ID" \
                 --password "$APPLE_APP_PASSWORD" \
                 --team-id "$APPLE_TEAM_ID" \
                 --output-format json > "$info_json" 2>&1; then
              status="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("status","Unknown"))' "$info_json")"
              echo "  Check ${i}/6: ${status}"
              if [ "$status" = "In Progress" ] || [ "$status" = "Accepted" ]; then
                echo ""
                echo "══════════════════════════════════════════════════════════════"
                echo "  SUBMISSION CONFIRMED"
                echo "  Submission ID : $SUBMISSION_ID"
                echo "  Status        : $status"
                echo "  Build Run ID  : ${{ inputs.build_run_id }}"
                echo ""
                echo "  Run 'Notarize: Check Status' with the Submission ID"
                echo "  to poll progress and staple when ready."
                echo "══════════════════════════════════════════════════════════════"
                exit 0
              elif [ "$status" = "Invalid" ]; then
                echo "::error::Apple immediately rejected the submission."
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_APP_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
                exit 1
              fi
            else
              echo "  Check ${i}/6: (API unreachable, retrying...)"
            fi
          done

          # If we got here, Apple took >3 min to show status — still OK
          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo "  SUBMITTED (status not yet confirmed, but upload succeeded)"
          echo "  Submission ID : $SUBMISSION_ID"
          echo "  Build Run ID  : ${{ inputs.build_run_id }}"
          echo ""
          echo "  Run 'Notarize: Check Status' with the Submission ID."
          echo "══════════════════════════════════════════════════════════════"
