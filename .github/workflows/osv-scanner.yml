name: OSV Scanner

on:
  pull_request:
    paths:
      - "uv.lock"
      - "docs-site/package-lock.json"
      - "src/row_bot/channels/whatsapp_bridge/package-lock.json"
      - ".github/workflows/osv-scanner.yml"
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Scan committed lockfiles
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=uv.lock
            --lockfile=docs-site/package-lock.json
            --lockfile=src/row_bot/channels/whatsapp_bridge/package-lock.json
