name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libegl1 libglib2.0-0 libxcb-cursor0

      - name: Install Python packages
        run: python -m pip install -r requirements.txt pytest

      - name: Compile Python files
        run: python -m compileall -q -x "(\\.git|\\.venv|dist|build|__pycache__)" .

      - name: Focused startup hardening tests
        run: python -m pytest tests/test_startup_hardening.py tests/test_app_port.py

      - name: Focused provider model selection tests
        run: python -m pytest tests/test_provider_catalog.py tests/test_provider_selection.py tests/test_thoth_status_media.py tests/test_provider_subscription_auth.py

      - name: Runtime smoke on Linux
        if: runner.os == 'Linux'
        run: python scripts/smoke_app.py --port 8090 --timeout 120

      - name: Validate Linux installer scripts
        if: runner.os == 'Linux'
        run: bash -n build_linux_app.sh installer/build_linux_app.sh installer/install-linux.sh

  full-test:
    name: Full regression suite
    runs-on: macos-latest
    timeout-minutes: 45
    needs: smoke

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ollama
        run: |
          brew install ollama
          ollama serve &
          sleep 5
          ollama pull qwen3:1.7b

      - name: Install Python packages
        run: python -m pip install -r requirements.txt pytest

      - name: Run test suite
        run: python tests/test_suite.py
